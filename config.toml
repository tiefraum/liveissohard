baseURL = "/"
title = "果仁糖"
languageCode = "zh-cn"
DefaultContentLanguage = "zh-cn"
theme = "hugo-theme-stack"

# 强制开启文章分页 
[pagination]
    pagerSize = 5

[params]
    mainSection = "post"
    description = "这里是我的数字自留地。"
    customCSS = ["css/custom.css"]

    # 小工具：每个 widget 必须是 {type = "..."} 格式，放进 homepage / page 数组
    # 主题只读取 widgets.homepage（首页右栏）与 widgets.page（文章页右栏）
    [params.widgets]
        # 首页右栏：搜索 + 归档 + 标签云（去掉分类）
        homepage = [
            {type = "search"},
            {type = "archives"},
            {type = "tag-cloud", params = {limit = 10}},
        ]
        # 文章页右栏：仅目录。无目录时右栏自动消失（中间栏占满）
        page = [
            {type = "toc"},
        ]

    # 文章：开启目录、摘要
    [params.article]
        toc = true
        showSummary = true

    # 搜索（Stack 内置前端搜索，需要 JSON 输出）
    [params.search]
        enable = true
        placeholder = "搜索文章…"

    # 评论：Giscus（需先在 GitHub 仓库开启 Discussions 并安装 Giscus App）
    [params.comments]
        enabled = true
        provider = "giscus"
        [params.comments.giscus]
            repo = "tiefraum/liveissohard"
            repoID = "R_kgDOTVOxIQ"
            category = "Announcements"
            categoryID = "DIC_kwDOTVOxIc4DA-ub"
            mapping = "pathname"
            strict = "1"
            reactionsEnabled = "1"
            emitMetadata = "0"
            inputPosition = "top"
            lightTheme = "light"
            darkTheme = "dark"
            lang = "zh-CN"
            loading = "lazy"

# 修复报错的核心：新版日期配置组合
[params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

[params.sidebar]
    emoji = "🌿"
    subtitle = "ケーキも大好き、君も大好き"
    avatar = "img/avatar.png"

[params.colorScheme]
    toggle = true
    default = "auto"

# 首页卷首语 + 复古挂件（since 用于计算运行天数）
[params.profile]
    intro = "ケーキも大好き、君も大好き"
    introSub = "喜欢蛋糕也喜欢你"
    since = "2026-07-11"


# 搜索索引需要 JSON 输出
[outputs]
    home = ["HTML", "RSS", "JSON"]

# 顶部导航菜单
[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
[[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 2
[[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 3
[[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5
[[menu.main]]
    name = "友链"
    url = "/links/"
    weight = 6