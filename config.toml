baseURL = "/"
title = "我的小站"
languageCode = "zh-cn"
DefaultContentLanguage = "zh-cn"
theme = "hugo-theme-stack"

# 强制开启文章分页 (新版语法)
[pagination]
    pagerSize = 5

[params]
    mainSection = "post"
    description = "这里是我的数字自留地。"

# 修复报错的核心：新版日期配置组合
[params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

[params.sidebar]
    emoji = "🗂️"
    subtitle = "务实至上"

[params.colorScheme]
    toggle = true
    default = "auto"