baseURL = "/"
title = "果仁糖"
languageCode = "zh-cn"
DefaultContentLanguage = "zh-cn"
theme = "hugo-theme-stack"

# 强制开启文章分页 
[pagination]
    pagerSize = 5

[params]
    mainSection = "post"
    description = "这里是我的数字自留地。"

# 修复报错的核心：新版日期配置组合
[params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

[params.sidebar]
    emoji = "🗂️"
    subtitle = "ケーキも大好き、君も大好き"
    avatar = "img/avatar.png"

[params.colorScheme]
    toggle = true
    default = "auto"


[params.author]
    name = "336"
    intro = "日啖网友三百个"